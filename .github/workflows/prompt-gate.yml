name: Prompt Release Gate

# Run only when a prompt or the eval set changes — keep CI cheap and targeted.
on:
  pull_request:
    paths:
      - "02-prompt-release-safety-gate/prompts/**"
      - "02-prompt-release-safety-gate/data/golden.jsonl"

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02-prompt-release-safety-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      # Defaults to the keyless `test` provider. For real scoring, set repo
      # secrets and: env: { llm_provider: openai, openai_api_key: ${{ secrets.OPENAI_API_KEY }} }
      - name: Run release gate
        run: python -m app.cli --baseline v1_production --candidate v2_candidate
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prompt-gate-report
          path: 02-prompt-release-safety-gate/reports/
      - name: Comment report on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('02-prompt-release-safety-gate/reports/report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner, repo: context.repo.repo, body
            });
